<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NAM_MASTER_AVATAR_PRO</title>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>
    
    <style>
        :root { --main-blue: #4285F4; --admin-green: #00ff00; --key-gold: #f4b400; }
        body { background: #000; color: #0f0; font-family: 'Courier New', monospace; margin: 0; }
        
        /* HEADER CÓ AVATAR */
        .header { background: #111; padding: 10px 15px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid #333; position: sticky; top: 0; z-index: 100; }
        .header-left { display: flex; align-items: center; }
        .menu-btn { font-size: 24px; cursor: pointer; color: var(--main-blue); margin-right: 15px; }
        .user-avt { width: 35px; height: 35px; border-radius: 50%; border: 2px solid var(--main-blue); background: #222; }

        /* SIDEBAR */
        .sidebar { height: 100%; width: 0; position: fixed; z-index: 200; top: 0; left: 0; background-color: #0a0a0a; overflow-x: hidden; transition: 0.3s; padding-top: 20px; border-right: 1px solid #333; }
        .user-profile-side { padding: 20px; text-align: center; border-bottom: 1px solid #222; margin-bottom: 10px; }
        .side-avt { width: 60px; height: 60px; border-radius: 50%; border: 2px solid var(--admin-green); margin-bottom: 10px; }
        .sidebar a { padding: 15px 25px; text-decoration: none; font-size: 14px; color: #aaa; display: block; border-bottom: 1px solid #111; }
        .sidebar .closebtn { position: absolute; top: 5px; right: 15px; font-size: 25px; color: #fff; }

        .container { padding: 15px; }
        .section { display: none; }
        .section.active { display: block; }
        .box { border: 1px solid #333; padding: 15px; border-radius: 8px; background: #0a0a0a; margin-bottom: 10px; }
        .points { font-size: 45px; color: yellow; text-shadow: 0 0 10px red; font-weight: bold; text-align: center; }
        input { width: 90%; padding: 12px; margin: 10px 0; background: #1a1a1a; border: 1px solid #333; color: #fff; text-align: center; border-radius: 5px; }
        button { width: 100%; padding: 15px; margin: 5px 0; border: none; font-weight: bold; border-radius: 5px; cursor: pointer; color: #fff; }
        .btn-blue { background: var(--main-blue); }
        .btn-gold { background: var(--key-gold); color: #000; }
        .btn-red { background: #ea4335; }
        .btn-green { background: var(--admin-green); color: #000; }
        .mail-box { border: 1px solid #0f0; padding: 10px; margin-top: 10px; position: relative; border-radius: 5px; background: #050505; }
        .otp { color: yellow; font-size: 22px; font-weight: bold; position: absolute; right: 10px; top: 10px; }
        #login-ui { text-align: center; padding-top: 80px; }
    </style>
</head>
<body>

    <div id="login-ui">
        <h2 style="color:var(--main-blue);">?? NAM MASTER SYSTEM</h2>
        <div class="box" style="margin: 20px;">
            <button class="btn-blue" onclick="loginGoogle()">ĐANG NH?P GOOGLE</button>
        </div>
    </div>

    <div id="main-ui" style="display:none;">
        <div class="header">
            <div class="header-left">
                <div class="menu-btn" onclick="toggleNav()">?</div>
                <span style="font-size: 14px; font-weight: bold;">NAM MASTER</span>
            </div>
            <img id="h-avatar" class="user-avt" src="" alt="AVT">
        </div>

        <div id="mySidebar" class="sidebar">
            <a href="javascript:void(0)" class="closebtn" onclick="toggleNav()">×</a>
            <div class="user-profile-side">
                <img id="s-avatar" class="side-avt" src="" alt="AVT">
                <div id="s-name" style="font-size: 14px; color: #fff; font-weight: bold;"></div>
                <div id="s-email" style="font-size: 10px; color: #666;"></div>
            </div>
            <a href="#" onclick="showSection('sec-home')">?? Trang Ch? (Đi?m)</a>
            <a href="#" id="menu-admin" style="display:none; color:var(--admin-green);" onclick="showSection('sec-admin')">??? Qu?n Lý Key (Admin)</a>
            <a href="#" onclick="showSection('sec-earn')">?? Ki?m Đi?m (Vu?t Link)</a>
            <a href="#" onclick="showSection('sec-mail')">?? T?o Gmail TM</a>
            <a href="#" onclick="showSection('sec-key')">?? N?p Mă Key</a>
            <a href="#" onclick="logout()" style="color: #ff4444;">?? Đang Xu?t</a>
        </div>

        <div class="container">
            <div id="sec-home" class="section active">
                <div class="box">
                    <div class="points" id="u-points">0</div>
                    <p style="text-align:center; color:#888; font-size:10px;">ĐI?M TRONG TŔI KHO?N</p>
                </div>
            </div>

            <div id="sec-admin" class="section">
                <div class="box" style="border-color: var(--admin-green);">
                    <h3 style="color:var(--admin-green); margin:0;">KHO KEY ADMIN</h3>
                    <input type="text" id="admin-key-input" placeholder="Tęn key ho?c Random...">
                    <button class="btn-green" style="width:48%;" onclick="generateRandomKey()">RANDOM ??</button>
                    <button class="btn-green" style="width:48%;" onclick="adminCreateKey()">LUU ??</button>
                    <div id="admin-list" style="margin-top:10px; max-height:200px; overflow-y:auto; font-size:10px;"></div>
                </div>
            </div>

            <div id="sec-earn" class="section">
                <div class="box">
                    <h3>VU?T LINK KI?M ĐI?M</h3>
                    <button class="btn-gold" onclick="taoLink4M()">B?T Đ?U (+1d)</button>
                </div>
            </div>

            <div id="sec-mail" class="section">
                <div class="box">
                    <button class="btn-red" onclick="buyMail(1)">T?O 1 MAIL (-1 ĐI?M)</button>
                    <p id="stt-mail" style="font-size:10px; text-align:center; color: #888;">S?n sŕng!</p>
                </div>
                <div id="mail-list"></div>
            </div>

            <div id="sec-key" class="section">
                <div class="box" style="border-color: var(--key-gold);">
                    <input type="text" id="input-key" placeholder="Dán mă 30 di?m vŕo dây...">
                    <button class="btn-gold" onclick="checkKey()">XÁC NH?N N?P</button>
                </div>
            </div>
        </div>
    </div>

<script>
    const firebaseConfig = {
  apiKey: "AIzaSyBbPIh-2s5medySYTDnqh2TA-2HI1JmsFI",
  authDomain: "savedatabynamtool.firebaseapp.com",
  databaseURL: "https://savedatabynamtool-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "savedatabynamtool",
  storageBucket: "savedatabynamtool.firebasestorage.app",
  messagingSenderId: "928888128176",
  appId: "1:928888128176:web:6aa0d714ed6c5886e87175"
    };

    const ADMIN_EMAIL = "hoangnamtuphap.hv@gmail.com"; 

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.database();
    const L4M_API = "69231267551477519f74201f";
    const LINK_THANH_CONG = "https://hoangnamtuphaphv-ctrl.github.io/tool_gmail/thanhcong.html";

    let currentUser = null;
    let points = 0;
    let mailData = [];

    function toggleNav() {
        const side = document.getElementById("mySidebar");
        side.style.width = side.style.width === "250px" ? "0" : "250px";
    }

    function showSection(id) {
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        toggleNav();
    }

    auth.onAuthStateChanged(user => {
        if (user) { 
            currentUser = user; 
            document.getElementById('login-ui').style.display = 'none';
            document.getElementById('main-ui').style.display = 'block';
            
            // C?P NH?T AVATAR VŔ THÔNG TIN
            document.getElementById('h-avatar').src = user.photoURL || "https://img.icons8.com/fluency/48/user-male-circle.png";
            document.getElementById('s-avatar').src = user.photoURL || "https://img.icons8.com/fluency/48/user-male-circle.png";
            document.getElementById('s-name').innerText = user.displayName;
            document.getElementById('s-email').innerText = user.email;

            if (user.email === ADMIN_EMAIL) {
                document.getElementById('menu-admin').style.display = 'block';
                loadAdminKeys();
            }
            loadData();
        }
    });

    function loginGoogle() { auth.signInWithPopup(new firebase.auth.GoogleAuthProvider()); }
    function logout() { auth.signOut().then(() => location.reload()); }

    async function loadData() {
        const snap = await db.ref('users/' + currentUser.uid).once('value');
        const d = snap.val();
        if(d) { points = d.points || 0; mailData = d.savedMails || []; }
        const urlParams = new URLSearchParams(window.location.search);
        if(urlParams.get('add') === 'true') {
            points += 1; await syncData();
            window.history.replaceState({}, '', window.location.pathname);
        }
        updateUI(); renderMails();
    }

    async function syncData() {
        await db.ref('users/' + currentUser.uid).update({ points: points, savedMails: mailData });
        updateUI();
    }

    function updateUI() { document.getElementById('u-points').innerText = points; }

    function generateRandomKey() {
        const c = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
        let r = 'NAM-';
        for (let i = 0; i < 5; i++) r += c.charAt(Math.floor(Math.random() * c.length));
        document.getElementById('admin-key-input').value = r;
    }

    async function adminCreateKey() {
        const k = document.getElementById('admin-key-input').value.trim();
        if(!k) return;
        await db.ref('keys/' + k).set({ status: "unused", createdAt: Date.now() });
        document.getElementById('admin-key-input').value = "";
    }

    function loadAdminKeys() {
        db.ref('keys').on('value', snap => {
            const keys = snap.val();
            const list = document.getElementById('admin-list');
            list.innerHTML = "";
            if(!keys) return;
            Object.keys(keys).reverse().forEach(k => {
                const col = keys[k].status === "unused" ? "#0f0" : "#555";
                list.innerHTML += `<div style="border-bottom:1px solid #222; padding:5px; display:flex; justify-content:space-between;">
                    <span style="color:${col}">${k}</span>
                    <button onclick="copyClip('${k}')" style="width:auto; padding:2px 5px; font-size:9px;">Copy</button>
                </div>`;
            });
        });
    }

    async function checkKey() {
        const ki = document.getElementById('input-key').value.trim();
        if(!ki) return;
        const res = await db.ref('keys/' + ki).once('value');
        const kv = res.val();
        if(kv && kv.status === "unused") {
            points += 30;
            await db.ref('keys/' + ki).update({ status: "used", usedBy: currentUser.email });
            await syncData();
            alert("? N?p thŕnh công 30 di?m!");
            document.getElementById('input-key').value = "";
            showSection('sec-home');
        } else { alert("? Key không h?p l?!"); }
    }

    async function taoLink4M() {
        const url = `https://link4m.co/api-shorten/v2?api=${L4M_API}&url=${encodeURIComponent(LINK_THANH_CONG)}`;
        try {
            const r = await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent(url)}`);
            const j = await r.json();
            const res = JSON.parse(j.contents);
            if(res.status === "success") window.location.href = res.shortenedUrl;
        } catch(e) { alert("L?i m?ng!"); }
    }

    async function buyMail(n) {
        if(points < n) return alert("H?t di?m!");
        document.getElementById('stt-mail').innerText = "? Đang t?o...";
        points -= n; await syncData(); await createMailTM();
    }

    async function createMailTM() {
        try {
            const d = await fetch('https://api.mail.tm/domains').then(r => r.json());
            const dom = d['hydra:member'][0].domain;
            const user = "nam" + Math.random().toString(36).slice(-5) + "@" + dom;
            const pass = "Nam123456!";
            await fetch('https://api.mail.tm/accounts', {method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({address: user, password: pass})});
            const t = await fetch('https://api.mail.tm/token', {method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({address: user, password: pass})}).then(r => r.json());
            mailData.unshift({ address: user, token: t.token, otp: "------" });
            if(mailData.length > 5) mailData.pop();
            await syncData(); renderMails();
            document.getElementById('stt-mail').innerText = "? Đă t?o xong!";
        } catch(e) { alert("Server b?n!"); }
    }

    function renderMails() {
        document.getElementById('mail-list').innerHTML = mailData.map((m, i) => `
            <div class="mail-box">
                <span class="otp" id="otp-${i}">${m.otp}</span>
                <b>GMAIL:</b> ${m.address} <br>
                <button onclick="copyClip('${m.address}')" style="width:auto; padding:5px; margin-top:5px; font-size:10px; background:#333">Copy</button>
            </div>
        `).join('');
        startCheckOTP();
    }

    function startCheckOTP() {
        setInterval(async () => {
            mailData.forEach(async (m, i) => {
                if(m.otp !== "------") return;
                try {
                    const r = await fetch('https://api.mail.tm/messages', { headers: {'Authorization': `Bearer ${m.token}`} }).then(r => r.json());
                    if(r['hydra:member'].length > 0) {
                        const c = r['hydra:member'][0].intro.match(/\d{6}/);
                        if(c) { m.otp = c[0]; document.getElementById(`otp-${i}`).innerText = c[0]; await syncData(); }
                    }
                } catch(e) {}
            });
        }, 5000);
    }
    function copyClip(t) { navigator.clipboard.writeText(t); alert("Đă copy!"); }
</script>
</body>
</html>
