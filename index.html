<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NAM MASTER V12.1 - 1:1 RATIO</title>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>
    <style>
        :root { --b: #00d4ff; --r: #ff4444; --g: #00ff88; --bg: #050505; }
        body { background: var(--bg); color: #fff; font-family: 'Segoe UI', sans-serif; margin: 0; font-size: 13px; }
        .header { background: #111; padding: 10px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #222; position: sticky; top:0; z-index:10; }
        .sidebar { height: 100%; width: 0; position: fixed; z-index: 20; top: 0; left: 0; background: #0a0a0a; overflow-x: hidden; transition: 0.3s; border-right: 1px solid #222; }
        .sidebar a { padding: 12px 20px; text-decoration: none; color: #aaa; display: block; border-bottom: 1px solid #111; }
        .container { padding: 10px; max-width: 450px; margin: auto; }
        .section { display: none; } .active { display: block; }
        .box { border: 1px solid #222; padding: 15px; border-radius: 10px; background: #0f0f0f; margin-bottom: 10px; text-align: center; }
        .mail-box { border: 1px solid #333; padding: 10px; margin-bottom: 8px; border-radius: 8px; background: #000; position: relative; border-left: 4px solid var(--b); text-align: left; }
        .otp { color: #fff; background: #900; padding: 3px 8px; border-radius: 5px; font-weight: bold; position: absolute; right: 10px; top: 10px; font-size: 16px; border: 1px solid #f00; transition: 0.5s; }
        button { width: 100%; padding: 12px; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; margin-top: 8px; transition: 0.2s; font-size: 14px; }
        button:active { transform: scale(0.96); }
        .btn-b { background: var(--b); color: #000; } .btn-r { background: var(--r); color: #fff; } .btn-g { background: var(--g); color: #000; }
    </style>
</head>
<body>
    <div id="login-ui" style="text-align:center; padding-top:120px;">
        <h2 style="color:var(--b); letter-spacing: 2px;">🚀 NAM MASTER V12.1</h2>
        <button class="btn-b" onclick="loginG()" style="width:200px;">LOGIN GOOGLE</button>
    </div>

    <div id="main-ui" style="display:none;">
        <div class="header">
            <div onclick="tn()" style="font-size:24px; color:var(--b); cursor:pointer;">☰</div>
            <b style="letter-spacing:1px;">XEON MASTER TOOL</b>
            <img id="h-avt" style="width:32px; border-radius:50%; border:2px solid var(--b);">
        </div>

        <div id="sd" class="sidebar">
            <a href="javascript:void(0)" onclick="tn()" style="text-align:right; color:var(--r); font-size:20px;">×</a>
            <a href="#" onclick="ss('h')">🏠 Ví Điểm</a>
            <a href="#" onclick="ss('m')">📧 Xưởng Mail (1đ/Mail)</a>
            <a href="#" onclick="lo()" style="color:var(--r); margin-top:30px;">🚪 Đăng Xuất</a>
        </div>

        <div class="container">
            <div id="h" class="section active">
                <div class="box">
                    <p style="margin:0; font-size:12px; color:#888; text-transform: uppercase;">Điểm Của Sếp</p>
                    <div id="pts" style="font-size:60px; color:var(--g); font-weight:bold; text-shadow: 0 0 10px rgba(0,255,136,0.3);">0</div>
                    <button class="btn-g" onclick="goCayDiem()">🔗 VƯỢT LINK (+1 ĐIỂM)</button>
                    <p id="stt-cay" style="font-size:10px; color:#555; margin-top:10px;">Vượt xong link nhận ngay 1 điểm vào ví!</p>
                </div>
            </div>

            <div id="m" class="section">
                <div class="box" style="border-color:var(--r);">
                    <h3 style="color:var(--r); margin:0;">🚀 CHẾ TẠO MAIL</h3>
                    <p id="stt-mail" style="font-size:11px; color:#aaa; margin: 10px 0;">Sếp đang có <span id="pts-view" style="color:var(--g)">0</span> điểm</p>
                    <div style="display: flex; gap: 8px;">
                        <button class="btn-r" onclick="goX(1)">TẠO X1 (-1đ)</button>
                        <button class="btn-r" style="background:#b30000;" onclick="goX(5)">TẠO X5 (-5đ)</button>
                    </div>
                </div>
                <div id="m-list"></div>
            </div>
        </div>
    </div>

<script>
    // --- FIREBASE CONFIG (Sếp giữ nguyên) ---
    const cfg = { 
        apiKey: "AIzaSyBbPIh-2s5medySYTDnqh2TA-2HI1JmsFI",
        authDomain: "savedatabynamtool.firebaseapp.com",
        databaseURL: "https://savedatabynamtool-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "savedatabynamtool",
        storageBucket: "savedatabynamtool.firebasestorage.app",
        messagingSenderId: "928888128176",
        appId: "1:928888128176:web:6aa0d714ed6c5886e87175" 
    };
    
    // --- LINK RÚT GỌN ---
    const API_L4M = "DÁN_API_LINK4M_CỦA_SẾP_VÀO_ĐÂY"; 
    const MY_URL = window.location.href.split('?')[0];

    firebase.initializeApp(cfg); const auth = firebase.auth(); const db = firebase.database();
    let u=null, p=0, md=[];

    function tn() { const s = document.getElementById("sd"); s.style.width = s.style.width === "220px" ? "0" : "220px"; }
    function ss(id) { document.querySelectorAll('.section').forEach(s => s.classList.remove('active')); document.getElementById(id).classList.add('active'); tn(); }
    function cp(t) { navigator.clipboard.writeText(t); alert("Đã Copy!"); }

    auth.onAuthStateChanged(usr => { 
        if (usr) { 
            u=usr; 
            document.getElementById('login-ui').style.display='none'; 
            document.getElementById('main-ui').style.display='block'; 
            document.getElementById('h-avt').src=usr.photoURL; 
            checkBonus(); 
            lD(); 
        } 
    });

    async function lD() { 
        const s = await db.ref('users/'+u.uid).once('value'); 
        const d = s.val(); 
        if(d) { p=d.points||0; md=d.savedMails||[]; } 
        upUI(); rM(); 
    }

    function upUI() { 
        document.getElementById('pts').innerText = p;
        document.getElementById('pts-view').innerText = p;
    }
    async function syn() { await db.ref('users/'+u.uid).update({ points:p, savedMails:md }); upUI(); }
    function loginG() { auth.signInWithPopup(new firebase.auth.GoogleAuthProvider()); }
    function lo() { auth.signOut().then(()=>location.reload()); }

    // --- CÀY ĐIỂM (Tỉ lệ +1) ---
    async function goCayDiem() {
        if(!u) return;
        const target = `${MY_URL}?bonus_for=${u.uid}`;
        try {
            const res = await fetch(`https://link4m.com/api-shorten?api=${API_L4M}&url=${encodeURIComponent(target)}`).then(r => r.json());
            if(res.shortenedUrl) window.location.href = res.shortenedUrl;
            else alert("Lỗi API Link4M!");
        } catch(e) { alert("Mạng yếu rồi sếp!"); }
    }

    async function checkBonus() {
        const params = new URLSearchParams(window.location.search);
        const bUid = params.get('bonus_for');
        if(bUid && u && bUid === u.uid) {
            p += 1; // THƯỞNG 1 ĐIỂM ĐÚNG Ý SẾP
            await syn();
            alert("✅ Đã cộng +1 điểm!");
            window.history.pushState({}, '', MY_URL);
        }
    }

    // --- TẠO MAIL (Tỉ lệ -1) ---
    async function goX(n) { 
        if(p < n) return alert("Hết điểm! Sếp đi vượt link lấy thêm điểm nhé!"); 
        for(let i=0; i<n; i++) { 
            document.getElementById('stt-mail').innerText = `🚀 Đang đúc ${i+1}/${n}...`;
            await cM(); 
        } 
        document.getElementById('stt-mail').innerText = `✅ Đã xong ${n} mail!`;
    }

    async function cM() { 
        const api = Math.random() > 0.5 ? 'api.mail.tm' : 'api.mail.gw';
        try {
            const d = await fetch(`https://${api}/domains`).then(r => r.json());
            const user = "n"+Math.random().toString(36).slice(-6)+"@"+d['hydra:member'][0].domain;
            const pass = "Nam"+Math.floor(Math.random()*999);
            await fetch(`https://${api}/accounts`, {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({address:user, password:pass})});
            const t = await fetch(`https://${api}/token`, {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({address:user, password:pass})}).then(r => r.json());
            md.unshift({ address:user, token:t.token, otp:"---", server:api }); 
            p--; // TRỪ 1 ĐIỂM ĐÚNG Ý SẾP
            syn(); rM();
        } catch(e) {}
    }

    function rM() { 
        document.getElementById('m-list').innerHTML = md.map((m, i) => `
            <div class="mail-box">
                <span class="otp" id="o-${i}">${m.otp}</span>
                <b style="color:var(--b)">📧 MAIL:</b> ${m.address}<br>
                <div style="margin-top:5px;">
                    <button onclick="cp('${m.address}')" style="width:auto;padding:3px 10px;font-size:11px;background:#222;color:var(--b);">Copy</button>
                    <button onclick="delM(${i})" style="width:auto;padding:3px 10px;font-size:11px;background:#300;color:var(--r);margin-left:8px;">Xóa</button>
                </div>
            </div>`).join(''); 
        stOTP(); 
    }

    function delM(i) { if(confirm("Xóa acc này?")) { md.splice(i,1); syn(); rM(); } }

    function stOTP() { 
        if(window.oI) clearInterval(window.oI); 
        window.oI = setInterval(() => { 
            md.forEach(async (m, i) => { 
                if(m.otp!=="---" && m.otp.length === 6) return; 
                try { 
                    const r = await fetch(`https://${m.server}/messages`, { headers:{'Authorization':`Bearer ${m.token}`} }).then(r => r.json()); 
                    if(r['hydra:member'].length > 0) {
                        const msg = await fetch(`https://${m.server}/messages/${r['hydra:member'][0].id}`, { headers:{'Authorization':`Bearer ${m.token}`} }).then(r => r.json());
                        const text = (msg.intro || "") + (msg.text || "");
                        const c = text.match(/\d{6}/);
                        if(c) { 
                            m.otp = c[0]; document.getElementById(`o-${i}`).innerText = c[0]; 
                            document.getElementById(`o-${i}`).style.background = "#00ff88";
                            document.getElementById(`o-${i}`).style.color = "#000";
                            syn(); 
                        } 
                    } 
                } catch(e) {} 
            }); 
        }, 4000); 
    }
</script>
</body>
</html>
