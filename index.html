<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NAM_MASTER_SYSTEM</title>
    <style>
        body { background: #000; color: #0f0; font-family: monospace; padding: 10px; text-align: center; }
        .box { border: 2px solid #ff0050; padding: 15px; border-radius: 8px; background: #111; margin-bottom: 10px; }
        button { width: 100%; padding: 16px; margin: 8px 0; border: none; font-weight: bold; border-radius: 5px; cursor: pointer; color: #fff; font-size: 14px; }
        .btn-l4m { background: #f4b400; color: #000; box-shadow: 0 4px #b8860b; }
        .btn-l4m:active { transform: translateY(2px); box-shadow: 0 2px #b8860b; }
        .btn-mail { background: #ff0050; box-shadow: 0 4px #b00037; }
        .points { font-size: 50px; color: yellow; text-shadow: 0 0 10px red; font-weight: bold; }
        #stt { font-size: 11px; color: #ff0050; background: #222; padding: 5px; display: inline-block; border-radius: 3px; }
        .mail-box { background: #222; border: 1px solid #0f0; padding: 10px; margin-top: 10px; text-align: left; border-radius: 5px; position: relative; }
        .otp { color: yellow; font-size: 22px; font-weight: bold; position: absolute; right: 10px; top: 10px; border: 1px dashed yellow; padding: 2px 5px; }
    </style>
</head>
<body>

    <div class="box">
        <h2 style="color:#ff0050; margin:0;">?? NAM MASTER VIP</h2>
        <div id="stt">ĐANG KI?M TRA H? TH?NG...</div>
    </div>

    <div class="box">
        <div class="points" id="u-points">0</div>
        <div style="font-size: 10px; color: #888; margin-bottom: 5px;">ĐI?M TRĘN DATABASE</div>
        
        <button class="btn-l4m" onclick="taoLink4M()">?? L?Y LINK VU?T (+1d)</button>
    </div>

    <div id="tool-area" style="display:none;">
        <div class="box" style="border-color: #0f0;">
            <p style="color:#0f0; margin:0 0 10px 0;">?? KHO T?O MAIL</p>
            <button class="btn-mail" onclick="buyMail(1)">T?O 1 MAIL TM (-1d)</button>
        </div>
    </div>

    <div id="mail-list"></div>

<script>
    // --- C?U HĚNH C?A S?P (DÁN VŔO ĐÂY) ---
    const L4M_API = "69231267551477519f74201f"; 
    const FB_TOKEN = "AIzaSyBbPIh-2s5medySYTDnqh2TA-2HI1JmsFI"; 
    const DB_URL = "https://savedatabynamtool-default-rtdb.asia-southeast1.firebasedatabase.app/";
    const MY_UID = "nam_master_01";
    
    // LINK GITHUB TH?T C?A S?P (ĐĂ FIX 404)
    const LINK_THANH_CONG = "https://hoangnamtuphaphv-ctrl.github.io/tool_gmail/thanhcong.html"; 
    // --------------------------------------

    let points = 0;
    let mailData = [];

    window.onload = async () => {
        const urlParams = new URLSearchParams(window.location.search);
        
        try {
            // 1. L?y di?m hi?n t?i
            const res = await fetch(`${DB_URL}/users/${MY_UID}.json?auth=${FB_TOKEN}`);
            const data = await res.json();
            points = data ? data.points : 0;

            // 2. Check xem có v?a vu?t link thŕnh công không
            if(urlParams.get('add') === 'true') {
                points += 1;
                await syncPoints();
                document.getElementById('stt').innerText = "? ĐĂ C?NG +1 ĐI?M THŔNH CÔNG!";
                // Xóa duôi link cho s?ch
                window.history.replaceState({}, document.title, window.location.pathname);
            } else {
                document.getElementById('stt').innerText = "H? TH?NG S?N SŔNG!";
            }
            updateUI();
        } catch(e) { document.getElementById('stt').innerText = "? L?I K?T N?I DATABASE!"; }
    };

    async function taoLink4M() {
        document.getElementById('stt').innerText = "? ĐANG N?U LINK RÚT G?N...";
        const apiURL = `https://link4m.co/api-shorten/v2?api=${L4M_API}&url=${encodeURIComponent(LINK_THANH_CONG)}`;
        
        try {
            const res = await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent(apiURL)}`);
            const json = await res.json();
            const result = JSON.parse(json.contents);

            if(result.status === "success") {
                window.open(result.shortenedUrl, '_blank');
                document.getElementById('stt').innerText = "?? ĐĂ M? LINK! VU?T XONG S? V? TRANG NH?N ĐI?M.";
            } else {
                alert("L?i Link4M: " + result.message);
            }
        } catch(err) { alert("L?i m?ng r?i s?p oi!"); }
    }

    async function syncPoints() {
        await fetch(`${DB_URL}/users/${MY_UID}.json?auth=${FB_TOKEN}`, {
            method: 'PATCH',
            body: JSON.stringify({ points: points })
        });
        updateUI();
    }

    function updateUI() {
        document.getElementById('u-points').innerText = points;
        document.getElementById('tool-area').style.display = points > 0 ? 'block' : 'none';
    }

    // --- LOGIC T?O MAIL T? Đ?NG ---
    async function buyMail(num) {
        if(points < num) return alert("S?p h?t di?m r?i, vu?t link ti?p di!");
        points -= num;
        await syncPoints();
        for(let i=0; i<num; i++) { await createMailTM(); }
    }

    async function createMailTM() {
        try {
            const d = await fetch('https://api.mail.tm/domains').then(r => r.json());
            const domain = d['hydra:member'][0].domain;
            const user = "nam" + Math.random().toString(36).slice(-5) + "@" + domain;
            const pass = "Nam123456!";
            
            await fetch('https://api.mail.tm/accounts', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({address: user, password: pass})
            });

            const t = await fetch('https://api.mail.tm/token', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({address: user, password: pass})
            }).then(r => r.json());

            mailData.unshift({ address: user, token: t.token, otp: "------" });
            renderMails();
        } catch(e) { alert("L?i t?o Mail.tm r?i!"); }
    }

    function renderMails() {
        const list = document.getElementById('mail-list');
        list.innerHTML = mailData.map((m, i) => `
            <div class="mail-box">
                <span class="otp" id="otp-${i}">${m.otp}</span>
                <b style="color:cyan;">MAIL:</b> ${m.address} <br>
                <button style="width:auto; padding:5px; margin-top:5px; font-size:10px; background:#444" onclick="navigator.clipboard.writeText('${m.address}')">Copy Mail</button>
            </div>
        `).join('');
        startCheckOTP();
    }

    function startCheckOTP() {
        const timer = setInterval(async () => {
            mailData.forEach(async (m, i) => {
                if(m.otp !== "------") return;
                const res = await fetch('https://api.mail.tm/messages', {
                    headers: {'Authorization': `Bearer ${m.token}`}
                }).then(r => r.json());
                
                if(res['hydra:member'].length > 0) {
                    const msg = res['hydra:member'][0].intro;
                    const code = msg.match(/\d{6}/); // L?y 6 s? OTP
                    if(code) {
                        m.otp = code[0];
                        document.getElementById(`otp-${i}`).innerText = code[0];
                        navigator.clipboard.writeText(code[0]);
                    }
                }
            });
        }, 5000);
    }
</script>
</body>
</html>
